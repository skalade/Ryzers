### ryzers build options

# No GPU needed for coordination server
gpu_support: false

# No X11 display needed
x11_display: false

# No camera needed
camera_support: false

### ryzers run options

# SuperLink ports
port_mappings:
- "9091:9091"  # ServerAppIO API
- "9092:9092"  # Fleet API
- "9093:9093"  # Control API
